cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: "automation"
    image: "ghcr.io/pally-ai/pally-automation-enclave@sha256:d9af2cd0fe3cedd094e6f83d613484530623f1c7311ab35938e5d760f2cd6297"
    env:
      - PORT: "8080"
      - PALLY_DEPLOY_TRACK: "dev"
      - PALLY_AUTOMATION_STATE_BASE_URL: "https://pally-staging-go-alb-1958265745.us-east-1.elb.amazonaws.com"
      - PALLY_TINFOIL_ATTESTATION_REQUIRED: "1"
      - PALLY_TINFOIL_REPO: "tinfoilsh/confidential-model-router"
      - PALLY_TINFOIL_ATTESTATION_URL: "https://inference.tinfoil.sh/.well-known/tinfoil-attestation"
      - PALLY_TINFOIL_ATTESTATION_PINNED_DIGEST: "1ba794e680ab56e6734d32c7358a37247619f3d3e4a01c36e9df22c1651d7dbf"
      - PALLY_BROWSER_USE_PROXY_PROVIDER: "brightdata"
      - PALLY_BROWSER_USE_PROXY_COUNTRY: "us"
      - PALLY_BROWSER_USE_PROXY_SESSION_STRATEGY: "sticky_per_domain"
      - PALLY_BROWSER_USE_PROVIDER_RETRY_LIMIT: "1"
      - PALLY_DEPLOY_RELEASE_TAG: "tinfoil-dev-20260514075119-333544bd03ae"
    secrets:
      - PALLY_TINFOIL_API_KEY
      - PALLY_AUTOMATION_STATE_PRIVATE_KEY_BASE64
      - PALLY_AUTOMATION_SERVICE_TOKEN
      - PALLY_AGENT_RUNTIME_TOKEN
      - PALLY_AGENT_TRANSPORT_PRIVATE_KEY_BASE64
      - PALLY_EXA_API_KEY
      - PALLY_FIRECRAWL_API_KEY
      - PALLY_BROWSER_USE_PROXY_BRIGHTDATA_HOST
      - PALLY_BROWSER_USE_PROXY_BRIGHTDATA_PORT
      - PALLY_BROWSER_USE_PROXY_BRIGHTDATA_USERNAME
      - PALLY_BROWSER_USE_PROXY_BRIGHTDATA_PASSWORD
      - PALLY_BRIGHTDATA_API_KEY
      - PALLY_BRIGHTDATA_SERP_ZONE
      - PALLY_BRIGHTDATA_UNLOCKER_ZONE
      - PALLY_BRIGHTDATA_BROWSER_API_HOST
      - PALLY_BRIGHTDATA_BROWSER_API_PORT
      - PALLY_BRIGHTDATA_BROWSER_API_USERNAME
      - PALLY_BRIGHTDATA_BROWSER_API_PASSWORD
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3",
          "-S",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

shim:
  upstream-port: 8080
  paths:
    - /health
    - /agent/*
    - /automation/*
